name: Release

# Trigger: push a version tag (v1.2.3) OR run manually from the Actions tab.
#
# Flow:
#   1. This job creates the GitHub release with auto-generated notes.
#   2. The SLSA workflow fires on the release-created event, builds
#      signed binaries, and uploads them to the same release.
#
# To release from the command line:
#   git tag v1.2.3 && git push origin v1.2.3
#
# To release from the UI:
#   Actions -> Release -> Run workflow -> enter version

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Manual trigger: create and push the tag first.
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.version }}" \
            -m "Release ${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Create the GitHub release. --generate-notes pulls from merged PR
      # titles and descriptions since the previous tag, grouped by the
      # categories defined in .github/release.yml.
      - name: Create GitHub release
        run: |
          gh release create "${{ steps.tag.outputs.value }}" \
            --title "${{ steps.tag.outputs.value }}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Prepend the same release notes to CHANGELOG.md.
      # Opens a PR instead of pushing directly to master (branch protection).
      # Auto-merge is enabled so it merges once CI passes.
      - name: Update CHANGELOG.md via PR
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          DATE=$(date +%Y-%m-%d)
          NOTES=$(gh release view "$TAG" --json body -q .body)
          BRANCH="chore/changelog-${TAG}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if [ -f CHANGELOG.md ]; then
            TMP=$(mktemp)
            head -1 CHANGELOG.md > "$TMP"
            printf "\n## %s - %s\n\n%s\n\n---\n" "$TAG" "$DATE" "$NOTES" >> "$TMP"
            tail -n +2 CHANGELOG.md >> "$TMP"
            mv "$TMP" CHANGELOG.md
          else
            printf "# Changelog\n\n## %s - %s\n\n%s\n" "$TAG" "$DATE" "$NOTES" > CHANGELOG.md
          fi

          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "Update CHANGELOG for ${TAG} [skip ci]"
          git push origin "$BRANCH"

          PR=$(gh pr create \
            --title "Update CHANGELOG for ${TAG}" \
            --body "Automated CHANGELOG update for release ${TAG}." \
            --base master \
            --head "$BRANCH" \
            --label "skip-changelog")

          gh pr merge "$PR" --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # Build and push multi-platform Docker image to ghcr.io.
  # Runs after the release job so the tag is guaranteed to exist.
  # Image: ghcr.io/iamvirul/sarc:<version>  and  ghcr.io/iamvirul/sarc:latest
  # -----------------------------------------------------------------------
  docker:
    name: Publish Docker image
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.value }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.tag.outputs.value }}
            COMMIT=${{ github.sha }}
            BUILT_BY=github-actions
          cache-from: type=gha
          cache-to: type=gha,mode=max
