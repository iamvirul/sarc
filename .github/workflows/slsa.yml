# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow compiles the sarc binary using a SLSA3 compliant builder,
# producing a signed provenance file that describes every step of the build.
# The project is an initiative of the OpenSSF (openssf.org) and is developed at
# https://github.com/slsa-framework/slsa-github-generator.
# The provenance file can be verified using https://github.com/slsa-framework/slsa-verifier.
# For more information about SLSA and how it improves the supply-chain, visit slsa.dev.

name: SLSA Go Releaser
on:
  workflow_dispatch:
  release:
    types: [created]

permissions: read-all

jobs:
  # -----------------------------------------------------------------------
  # Quality gate 1: build and test
  # The SLSA build job will not run if tests fail.
  # -----------------------------------------------------------------------
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: Benchmark smoke
        run: go test -run='^$' -bench=. -benchtime=1x ./benchmarks/...

  # -----------------------------------------------------------------------
  # Quality gate 2: format
  # -----------------------------------------------------------------------
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  # -----------------------------------------------------------------------
  # Quality gate 3: license headers
  # -----------------------------------------------------------------------
  license:
    name: License Header Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check copyright headers
        run: |
          missing=""
          while IFS= read -r f; do
            if ! head -1 "$f" | grep -q "^// Copyright"; then
              missing="$missing\n  $f"
            fi
          done < <(git ls-files '*.go')

          if [ -n "$missing" ]; then
            echo "Go files missing a copyright header:"
            printf "$missing\n"
            echo "Run scripts/add-copyright.sh to fix."
            exit 1
          fi
          echo "All Go files have copyright headers."

  # -----------------------------------------------------------------------
  # SLSA build: only runs after all quality gates pass.
  # Produces signed provenance (SLSA level 3) for each release binary.
  # -----------------------------------------------------------------------
  build:
    name: SLSA Build and Sign
    needs: [test, format, license]
    permissions:
      id-token: write   # to sign provenance
      contents: write   # to upload release assets
      actions: read     # to read workflow path
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v1.4.0
    with:
      go-version: "1.25"
      config-file: .slsa-goreleaser.yml
      compile-builder: true
