changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
        - bugfix
    - title: Security
      labels:
        - security
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI / Build
      labels:
        - ci
    - title: Other Changes
      labels:
        - "*"
